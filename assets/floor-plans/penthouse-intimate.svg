<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 560" font-family="'Jost', 'Helvetica Neue', sans-serif">
  <defs>
    <style>
      .wall { stroke: #c9a76b; stroke-width: 2; fill: none; stroke-dasharray: 8,4; }
      .dim { font-size: 11px; fill: #8a7e6f; }
      .dim-line { stroke: #8a7e6f; stroke-width: 0.7; stroke-dasharray: 3,2; }
      .table { fill: #d4cfc6; stroke: #a09888; stroke-width: 1; rx: 3; }
      .head-table { fill: #c9a76b; opacity: 0.2; stroke: #c9a76b; stroke-width: 1.2; }
      .chair { fill: none; stroke: #a09888; stroke-width: 0.8; }
      .bar { fill: #c9a76b; opacity: 0.2; stroke: #c9a76b; stroke-width: 1.5; }
      .bar-label { font-size: 10px; fill: #c9a76b; font-weight: 500; letter-spacing: 0.1em; }
      .label { font-size: 28px; font-weight: 300; fill: #1a1714; }
      .config-label { font-size: 13px; fill: #c9a76b; font-weight: 500; letter-spacing: 0.1em; }
      .head-label { font-size: 9px; fill: #c9a76b; font-weight: 500; }
    </style>
  </defs>

  <rect width="460" height="560" fill="#f4ede0" rx="8"/>

  <!-- Room outline -->
  <rect x="60" y="60" width="340" height="400" class="wall"/>

  <!-- Dimension lines -->
  <line x1="60" y1="40" x2="400" y2="40" class="dim-line"/>
  <text x="230" y="35" text-anchor="middle" class="dim">26' 5"</text>
  <line x1="40" y1="60" x2="40" y2="460" class="dim-line"/>
  <text x="30" y="260" class="dim" transform="rotate(-90,30,260)" text-anchor="middle">34' 1"</text>

  <!-- Small head table at top (intimate 6-top) -->
  <rect x="175" y="85" width="110" height="22" class="head-table" rx="3"/>
  <text x="230" y="100" text-anchor="middle" class="head-label">HEAD TABLE</text>
  <ellipse cx="195" cy="117" rx="7" ry="5" class="chair"/>
  <ellipse cx="220" cy="117" rx="7" ry="5" class="chair"/>
  <ellipse cx="245" cy="117" rx="7" ry="5" class="chair"/>
  <ellipse cx="270" cy="117" rx="7" ry="5" class="chair"/>
  <ellipse cx="195" cy="77" rx="7" ry="5" class="chair"/>
  <ellipse cx="265" cy="77" rx="7" ry="5" class="chair"/>

  <!-- Row 1 - 3 tables (more spacious) -->
  <g transform="translate(100,160)">
    <rect x="0" y="0" width="60" height="30" class="table"/>
    <ellipse cx="10" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="-8" rx="7" ry="5" class="chair"/>
    <ellipse cx="10" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="38" rx="7" ry="5" class="chair"/>
    <ellipse cx="-8" cy="15" rx="5" ry="7" class="chair"/><ellipse cx="68" cy="15" rx="5" ry="7" class="chair"/>
  </g>
  <g transform="translate(200,160)">
    <rect x="0" y="0" width="60" height="30" class="table"/>
    <ellipse cx="10" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="-8" rx="7" ry="5" class="chair"/>
    <ellipse cx="10" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="38" rx="7" ry="5" class="chair"/>
    <ellipse cx="-8" cy="15" rx="5" ry="7" class="chair"/><ellipse cx="68" cy="15" rx="5" ry="7" class="chair"/>
  </g>
  <g transform="translate(300,160)">
    <rect x="0" y="0" width="60" height="30" class="table"/>
    <ellipse cx="10" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="-8" rx="7" ry="5" class="chair"/>
    <ellipse cx="10" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="38" rx="7" ry="5" class="chair"/>
    <ellipse cx="-8" cy="15" rx="5" ry="7" class="chair"/><ellipse cx="68" cy="15" rx="5" ry="7" class="chair"/>
  </g>

  <!-- Row 2 - 3 tables -->
  <g transform="translate(100,290)">
    <rect x="0" y="0" width="60" height="30" class="table"/>
    <ellipse cx="10" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="-8" rx="7" ry="5" class="chair"/>
    <ellipse cx="10" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="38" rx="7" ry="5" class="chair"/>
    <ellipse cx="-8" cy="15" rx="5" ry="7" class="chair"/><ellipse cx="68" cy="15" rx="5" ry="7" class="chair"/>
  </g>
  <g transform="translate(200,290)">
    <rect x="0" y="0" width="60" height="30" class="table"/>
    <ellipse cx="10" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="-8" rx="7" ry="5" class="chair"/>
    <ellipse cx="10" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="38" rx="7" ry="5" class="chair"/>
    <ellipse cx="-8" cy="15" rx="5" ry="7" class="chair"/><ellipse cx="68" cy="15" rx="5" ry="7" class="chair"/>
  </g>
  <g transform="translate(300,290)">
    <rect x="0" y="0" width="60" height="30" class="table"/>
    <ellipse cx="10" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="-8" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="-8" rx="7" ry="5" class="chair"/>
    <ellipse cx="10" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="30" cy="38" rx="7" ry="5" class="chair"/><ellipse cx="50" cy="38" rx="7" ry="5" class="chair"/>
    <ellipse cx="-8" cy="15" rx="5" ry="7" class="chair"/><ellipse cx="68" cy="15" rx="5" ry="7" class="chair"/>
  </g>

  <!-- Bar 1 - L-shaped bottom left -->
  <path d="M 75,380 L 75,440 L 180,440 L 180,420 L 95,420 L 95,380 Z" class="bar"/>
  <text x="135" y="435" text-anchor="middle" class="bar-label">BAR</text>

  <!-- Bar 2 - straight bottom right -->
  <rect x="280" y="420" width="100" height="25" class="bar" rx="3"/>
  <text x="330" y="437" text-anchor="middle" class="bar-label">BAR</text>

  <!-- Room label -->
  <text x="60" y="510" class="label">The Penthouse</text>
  <text x="60" y="528" class="config-label">INTIMATE SEATED — 55-65 GUESTS</text>
</svg>
