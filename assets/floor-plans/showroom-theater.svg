<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 560" font-family="'Jost', 'Helvetica Neue', sans-serif">
  <defs>
    <style>
      .wall { stroke: #c9a76b; stroke-width: 2; fill: none; stroke-dasharray: 8,4; }
      .dim { font-size: 11px; fill: #8a7e6f; }
      .dim-line { stroke: #8a7e6f; stroke-width: 0.7; stroke-dasharray: 3,2; }
      .chair { fill: none; stroke: #a09888; stroke-width: 0.8; }
      .label { font-size: 28px; font-weight: 300; fill: #1a1714; }
      .config-label { font-size: 13px; fill: #c9a76b; font-weight: 500; letter-spacing: 0.1em; }
      .stage { fill: #c9a76b; opacity: 0.15; stroke: #c9a76b; stroke-width: 1.5; }
      .stage-label { font-size: 14px; fill: #c9a76b; font-weight: 500; letter-spacing: 0.15em; }
      .curtain { stroke: #c9a76b; stroke-width: 1; fill: none; stroke-dasharray: 4,3; }
      .door { stroke: #8a7e6f; stroke-width: 1; fill: none; stroke-dasharray: 2,2; }
    </style>
  </defs>

  <rect width="460" height="560" fill="#f4ede0" rx="8"/>

  <!-- Room outline - irregular with angled left wall -->
  <path d="M 100,60 L 380,60 L 380,200 L 380,420 L 60,420 L 60,200 L 100,60 Z" class="wall"/>

  <!-- Stage area at top -->
  <rect x="100" y="60" width="280" height="90" class="stage" rx="4"/>
  <text x="240" y="112" text-anchor="middle" class="stage-label">STAGE</text>
  <!-- Curtain line -->
  <line x1="100" y1="150" x2="380" y2="150" class="curtain"/>

  <!-- Alcove on right side -->
  <path d="M 380,280 L 410,280 L 410,370 L 380,370" class="wall"/>

  <!-- Dimension lines -->
  <line x1="100" y1="40" x2="380" y2="40" class="dim-line"/>
  <text x="240" y="35" text-anchor="middle" class="dim">22' 0"</text>
  <line x1="400" y1="60" x2="400" y2="200" class="dim-line"/>
  <text x="412" y="135" class="dim" transform="rotate(90,412,135)" text-anchor="middle">13' 5"</text>
  <line x1="40" y1="200" x2="40" y2="420" class="dim-line"/>
  <text x="30" y="310" class="dim" transform="rotate(-90,30,310)" text-anchor="middle">20' 0"</text>

  <!-- Theater seating - rows of chairs facing stage -->
  <!-- Row 1 (closest to stage) - 7 chairs -->
