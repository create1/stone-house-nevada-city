    <ellipse cx="0" cy="0" rx="7" ry="5" class="chair"/>
    <ellipse cx="28" cy="0" rx="7" ry="5" class="chair"/>
    <ellipse cx="56" cy="0" rx="7" ry="5" class="chair"/>
